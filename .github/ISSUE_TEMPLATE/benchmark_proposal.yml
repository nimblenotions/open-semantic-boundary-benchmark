name: Benchmark proposal
description: Propose a new export condition, scenario pack, or protocol extension
title: "[Proposal]: "
labels: ["export condition"]
body:
  - type: markdown
    attributes:
      value: |
        v0.1.1 is a **frozen reference release**. Proposals that change assessors, splits, or committed transform IDs need a semver plan. See [`docs/extension_points.md`](https://github.com/nimblenotions/open-semantic-boundary-benchmark/blob/main/docs/extension_points.md).

  - type: dropdown
    id: proposal_type
    attributes:
      label: Proposal type
      options:
        - New export condition (transform arm)
        - New scenario pack / domain corpus
        - New purpose or consumer task
        - New linkage or utility assessor
        - Protocol / documentation change
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph — what are you proposing and why?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What artifacts would change? (corpus, policies, schemas, eval scripts, docs)
    validations:
      required: true

  - type: dropdown
    id: semver
    attributes:
      label: Expected semver impact
      options:
        - Patch to frozen v0.1.1 (needs strong justification)
        - New minor release (v0.2.x) — preferred for extensions
        - Major / breaking change
        - Unsure — need maintainer guidance
    validations:
      required: true

  - type: checkboxes
    id: frozen_check
    attributes:
      label: Frozen release checklist
      options:
        - label: I understand v0.1.1 split seed, nine primary condition IDs, and assessor definitions should not change without a migration note
          required: true
        - label: I am willing to discuss in this issue before opening a PR
          required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to related issues, papers, or prior art (optional)
